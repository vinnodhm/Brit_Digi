version: '3.9'

services:
  # ── Backend: OMS & PDF Engine ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bdp-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV:        production
      PORT:            5000
      DATABASE_URL:    ${DATABASE_URL}
      FRONTEND_URL:    http://localhost:3000
      PDF_OUTPUT_DIR:  /tmp/prints
    volumes:
      - pdf_output:/tmp/prints
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend: Next.js Storefront ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bdp-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV:                 production
      NEXT_PUBLIC_API_URL:      http://backend:5000
      NEXT_PUBLIC_RAZORPAY_KEY: ${RAZORPAY_TEST_KEY:-rzp_test_REPLACE_ME}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pdf_output:
    driver: local
